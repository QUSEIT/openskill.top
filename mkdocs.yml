site_name: OpenSkill.Top
site_url: https://openskill.top
site_description: OpenClaw 公开课 - 技能自动化工作流
site_author: OpenSkill Team

theme:
  name: material
  language: zh
  palette:
    scheme: slate
    primary: orange
    accent: orange
  logo: static/openskill.png
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy
  alternate:
    - name: 中文
      link: /
      lang: zh
    - name: English
      link: /en/
      lang: en

extra_css:
  - stylesheets/extra.css

nav:
  - 首页: zh/index.md
  - Installation:
      - zh/installation/index.md
      - 更安全地部署OpenClaw：我的容器化隔离实践: zh/installation/bwp-2026-03-25-openclaw-v1.1.md
      - 在OpenClaw容器中部署Claude Code（上）：从零开始搭建你的AI开发助手: zh/installation/bwp-2026-03-26-openclawclaude-code-v1.4.md
  - Skill Practice:
      - zh/skill-practice/index.md
  - Skill Sharing:
      - zh/skill-sharing/index.md
  - Use Cases:
      - zh/use-cases/index.md
  - English:
      - Home: en/index.md
      - Installation: en/installation/index.md
      - Skill Practice: en/skill-practice/index.md
      - Skill Sharing: en/skill-sharing/index.md
      - Use Cases: en/use-cases/index.md

plugins:
  - search
